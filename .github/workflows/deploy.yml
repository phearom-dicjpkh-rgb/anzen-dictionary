name: Deploy to GitHub Pages

# Deploys the app/ folder to GitHub Pages on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Upload app/ as the site
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./app
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
